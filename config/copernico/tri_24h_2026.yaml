description: "Triatleta 24h 2026. До 173 кругов по 4.04 км. КТ: 1kr..173kr."
# Поля верифицированы 2026-06-23 через реальный API-ответ.

fields:
  start_number: dorsal    # подтверждено: Copernico возвращает строку '1', '2', ...
  surname: surname        # подтверждено
  name: name              # подтверждено
  birthdate: birthdate    # есть в объекте, значение null до гонки
  gender: gender          # подтверждено: 'male'/'female' → нормализуется в M/F загрузчиком
  status: status          # подтверждено: 'notstarted' / 'finished'
  category: category      # подтверждено: пусто до гонки
  team_name: team         # поле team (+ fallback club) для команды

lap_fields:
  count: 175              # в Copernico гонка настроена на 173 КТ (все — одна физическая точка)
  # ВНИМАНИЕ: пресет в Copernico UI ограничен диапазоном 1-100.
  # Если Copernico API не вернёт поля times.official_101kr+ при пресете 1-100:
  # → создать второй пресет tri_24h_2026_b (101-173) и обновить загрузчик.
  # Проверить сразу после старта: запросить API и найти наличие times.official_101kr.
  pattern: "times.official_{n}kr"  # подтверждено по колонкам в UI: 1kr, 2kr, ...
