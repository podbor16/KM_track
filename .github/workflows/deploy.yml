name: Deploy to VPS

on:
  push:
    branches: [Map]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: "ci-test-secret-for-unit-tests"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src --cov-report=term-missing

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 60s
          script: |
            set -e

            # Обновить код
            git config --global --add safe.directory /opt/km_track
            git -C /opt/km_track pull origin Map

            # Применить nginx конфиг если изменился
            cp /opt/km_track/deploy/nginx.conf /etc/nginx/nginx.conf
            nginx -t
            systemctl reload nginx

            # Применить systemd unit если изменился
            cp /opt/km_track/deploy/km_track.service /etc/systemd/system/km_track.service
            systemctl daemon-reload

            # Перезапустить приложение
            systemctl restart km_track
            sleep 5

            # Проверить что поднялось
            curl -sf http://localhost:8000/ -o /dev/null || (echo "HEALTH CHECK FAILED" && exit 1)
            echo "=== Deploy OK ==="
