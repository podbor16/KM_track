worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # При нагрузочном тесте с одной машины VU шлют уникальный X-Forwarded-For.
    # Реальные пользователи заголовок не ставят → используется их реальный IP.
    map $http_x_forwarded_for $rate_limit_key {
        default $http_x_forwarded_for;
        ""      $binary_remote_addr;
    }

    limit_req_zone $rate_limit_key zone=api:10m rate=30r/s;
    limit_conn_zone $rate_limit_key zone=addr:10m;

    server {
        listen 80;
        server_name analytics.krasmarafon.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name analytics.krasmarafon.ru;

        ssl_certificate     /etc/letsencrypt/live/analytics.krasmarafon.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/analytics.krasmarafon.ru/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Статика напрямую через Nginx (быстрее, не нагружает Python)
        location /static/ {
            alias /opt/km_track/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            gzip_static on;
        }

        # SSE — отключаем буферизацию, большой таймаут
        location /api/sse/ {
            proxy_pass          http://127.0.0.1:8000;
            proxy_http_version  1.1;
            proxy_set_header    Connection "";
            proxy_buffering     off;
            proxy_cache         off;
            proxy_read_timeout  3600s;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            # limit_conn addr 50;  # отключено на время нагрузочного теста
        }

        # Всё остальное → FastAPI
        location / {
            proxy_pass          http://127.0.0.1:8000;
            proxy_set_header    Host $host;
            proxy_set_header    X-Real-IP $remote_addr;
            proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;
            proxy_read_timeout  60s;
            proxy_connect_timeout 10s;
            gzip                on;
            gzip_types          text/plain application/json text/css application/javascript;
            gzip_min_length     500;
            # limit_req zone=api burst=50 nodelay;  # отключено на время нагрузочного теста
        }

        # Логи
        access_log /var/log/nginx/km_track_access.log;
        error_log  /var/log/nginx/km_track_error.log;
    }
}
