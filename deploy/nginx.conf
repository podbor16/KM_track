server {
    listen 80;
    server_name analytics.krasmarafon.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name analytics.krasmarafon.ru;

    ssl_certificate     /etc/letsencrypt/live/analytics.krasmarafon.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/analytics.krasmarafon.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Статика напрямую через Nginx (быстрее, не нагружает Python)
    location /static/ {
        alias /opt/km_track/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # SSE — отключаем буферизацию, большой таймаут
    location /api/sse/ {
        proxy_pass          http://127.0.0.1:8000;
        proxy_http_version  1.1;
        proxy_set_header    Connection "";
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  3600s;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
    }

    # Всё остальное → FastAPI
    location / {
        proxy_pass          http://127.0.0.1:8000;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        gzip                on;
        gzip_types          text/plain application/json text/css application/javascript;
        gzip_min_length     500;
    }

    # Логи
    access_log /var/log/nginx/km_track_access.log;
    error_log  /var/log/nginx/km_track_error.log;
}
