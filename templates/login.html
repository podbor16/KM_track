<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Бизнес-аналитика КМ</title>
    <link rel="stylesheet" href="/static/css/krasmarafon-header.css?v=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .km-topbar {
            background: #222222;
            border-bottom: 3px solid #e84c8c;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .km-topbar .logo-text {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .km-topbar .logo-text span {
            color: #e84c8c;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .login-card {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .login-card .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #ccc;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 11px 14px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 5px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #e84c8c;
        }

        .error-msg {
            background: rgba(232, 76, 140, 0.12);
            border: 1px solid rgba(232, 76, 140, 0.4);
            border-radius: 5px;
            color: #e84c8c;
            font-size: 14px;
            padding: 10px 14px;
            margin-bottom: 18px;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: #e84c8c;
            border: none;
            border-radius: 5px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
        }

        .btn-login:hover {
            background: #d43a7a;
        }
    </style>
</head>
<body>
    <div class="km-topbar">
        <a href="/" class="logo-text">КМ<span>ТРЕК</span></a>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <h1>Бизнес-аналитика</h1>
            <p class="subtitle">Доступ только для организаторов мероприятий</p>

            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-group">
                    <label for="username">Логин</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        autocomplete="username"
                        autofocus
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>
                <button type="submit" class="btn-login">Войти</button>
            </form>
        </div>
    </div>
</body>
</html>
