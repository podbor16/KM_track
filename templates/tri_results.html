<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triatleta — Суточная велогонка 24ч</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon_tri_dark.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon_tri_light.ico" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tri_results.css?v={{ v }}">
</head>
<body>
    <div class="tri-header">
        <div>
            <div class="tri-header__eyebrow">Triatleta · 24 часа</div>
            <div class="tri-header__title">Суточная велогонка<br>25–26 июня 2026</div>
            <div class="tri-header__meta">Красноярск · Триатлон-центр · Круг: 4.04 км</div>
        </div>
        <div class="tri-elapsed-wrap">
            <div class="tri-elapsed-label">Прошло</div>
            <div class="tri-elapsed" id="elapsed">—</div>
        </div>
    </div>

    <!-- Фильтры -->
    <div class="tri-toolbar">
        <div class="tri-filter-group">
            <label class="tri-label">Зачёт:</label>
            <select id="filter-category" class="tri-select" onchange="applyFilters()">
                <option value="">Все</option>
                <option value="personal">Личный</option>
                <option value="Эстафета">Эстафета</option>
            </select>
        </div>
        <div class="tri-filter-group">
            <label class="tri-label">Пол:</label>
            <select id="filter-gender" class="tri-select" onchange="applyFilters()">
                <option value="">Все</option>
                <option value="Мужчина">Мужчины</option>
                <option value="Женщина">Женщины</option>
            </select>
        </div>
        <div class="tri-filter-group">
            <input type="search" id="filter-search" class="tri-search"
                   placeholder="Поиск по фамилии"
                   oninput="applyFilters()" onkeydown="if(event.key==='Enter')applyFilters()">
        </div>
        <span class="tri-results-count" id="results-count"></span>
    </div>

    <!-- Табы страницы -->
    <div class="tri-page-tabs">
        <button class="tri-page-tab active" onclick="switchPageTab('distance', this)">Расстояние</button>
        <button class="tri-page-tab" onclick="switchPageTab('segments', this)">Отрезки</button>
    </div>

    <div class="tri-container">

        <!-- Таб: Расстояние -->
        <div id="tab-distance">
            <div class="tri-table-wrap">
                <table class="tri-table">
                    <thead>
                        <tr>
                            <th class="tri-rank">#</th>
                            <th>Участник</th>
                            <th>Зачёт</th>
                            <th>Км</th>
                            <th>Кругов</th>
                            <th>Ср. скорость</th>
                            <th>Отставание</th>
                        </tr>
                    </thead>
                    <tbody id="standings-body">
                        <tr><td colspan="7" style="text-align:center;color:var(--tri-muted);padding:24px">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
            <div class="tri-refresh" id="refresh-label"></div>
        </div>

        <!-- Таб: Отрезки -->
        <div id="tab-segments" style="display:none">
            <div class="tri-splits">
                <div class="tri-slider-wrap">
                    <label class="tri-slider-label">
                        С часа: <span id="from-val">1</span>
                        <input type="range" id="from-slider" min="1" max="24" value="1" oninput="onSlider()">
                    </label>
                    <label class="tri-slider-label">
                        По час: <span id="to-val">24</span>
                        <input type="range" id="to-slider" min="1" max="24" value="24" oninput="onSlider()">
                    </label>
                </div>
                <div class="tri-table-wrap">
                    <table class="tri-table">
                        <thead>
                            <tr>
                                <th class="tri-rank">#</th>
                                <th>Участник</th>
                                <th>Зачёт</th>
                                <th>Кругов</th>
                                <th>Км</th>
                                <th>Ср. скорость</th>
                                <th>Отставание</th>
                            </tr>
                        </thead>
                        <tbody id="splits-body">
                            <tr><td colspan="7" style="text-align:center;color:var(--tri-muted);padding:16px">Ожидание данных...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
    const GUN_UTC_MS = new Date('2026-06-25T13:00:00Z').getTime();
    const LAP_KM = 4.040;
    let allStandings = [];
    let allLaps = [];
    let filteredPids = new Set(); // ID участников после применения фильтров

    // ---- Счётчик прошедшего времени ----
    function updateElapsed() {
        const now = Date.now();
        const diff = Math.max(0, now - GUN_UTC_MS);
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        document.getElementById('elapsed').textContent =
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    setInterval(updateElapsed, 1000);
    updateElapsed();

    function fmtMs(ms) {
        if (!ms) return '—';
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const ss = s % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    }

    function lapSpeed(lapMs) {
        if (!lapMs) return '—';
        return (LAP_KM / (lapMs / 3600000)).toFixed(1) + ' км/ч';
    }

    function switchLapTab(btn, showId, hideId) {
        btn.parentElement.querySelectorAll('.tri-detail-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(showId).style.display = '';
        document.getElementById(hideId).style.display = 'none';
    }

    async function loadStandings() {
        try {
            const r = await fetch('/api/tri/standings');
            const data = await r.json();
            allStandings = data.standings || [];
            applyFilters();
            document.getElementById('refresh-label').textContent =
                `Обновлено: ${new Date().toLocaleTimeString('ru-RU')}`;
        } catch(e) { console.error('standings error', e); }
    }

    function calculateGap(aLaps, aMs, leaderLaps, leaderMs) {
        if (aLaps < leaderLaps) {
            const diff = leaderLaps - aLaps;
            if (diff === 1) return '−1 круг';
            if (diff >= 2 && diff <= 4) return `−${diff} круга`;
            return `−${diff} кругов`;
        }
        const deltaMs = aMs - leaderMs;
        if (deltaMs <= 0) return '—';
        const s = Math.floor(deltaMs / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const ss = s % 60;
        return `+${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    }

    function applyFilters() {
        const category = document.getElementById('filter-category').value;
        const genderEl = document.getElementById('filter-gender');

        // Когда выбрана «Эстафета» — сбрасываем и блокируем фильтр пола
        if (category === 'Эстафета') {
            genderEl.value = '';
            genderEl.disabled = true;
        } else {
            genderEl.disabled = false;
        }

        const gender = genderEl.value;
        const search = document.getElementById('filter-search').value.trim().toLowerCase();

        let rows = allStandings.filter(r => {
            if (category === 'personal'  && r.category === 'Эстафета') return false;
            if (category === 'Эстафета'  && r.category !== 'Эстафета') return false;
            // При выборе пола эстафеты не показываем (gender='mixed' != 'Мужчина'/'Женщина')
            if (gender && r.gender !== gender) return false;
            if (search && !(r.surname || '').toLowerCase().includes(search)) return false;
            return true;
        });

        // Пересчитываем место и отставание от лидера отфильтрованной выборки
        if (rows.length > 0) {
            const leader = rows[0];
            rows = rows.map((r, i) => ({
                ...r,
                rank: i + 1,
                gap: i === 0 ? '—' : calculateGap(
                    r.laps_completed, r.elapsed_ms,
                    leader.laps_completed, leader.elapsed_ms
                ),
            }));
        }

        document.getElementById('results-count').textContent =
            rows.length ? `${rows.length} участн.` : '';

        filteredPids = new Set(rows.map(r => r.id));
        renderStandings(rows);
        renderSplits();
    }

    function switchPageTab(name, btn) {
        document.querySelectorAll('.tri-page-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-distance').style.display = name === 'distance' ? '' : 'none';
        document.getElementById('tab-segments').style.display = name === 'segments' ? '' : 'none';
        if (name === 'segments') renderSplits();
    }

    function renderStandings(rows) {
        const tbody = document.getElementById('standings-body');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--tri-muted);padding:24px">Нет данных</td></tr>';
            return;
        }
        // Лидер по последнему кругу
        const lastLapLeader = rows
            .filter(r => r.laps_completed > 0 && r.last_lap_ms > 0)
            .reduce((best, r) => (!best || r.last_lap_ms < best.last_lap_ms) ? r : best, null);
        const bestLapMs = lastLapLeader ? lastLapLeader.last_lap_ms : 0;

        // Лидер по лучшему кругу за всю гонку
        const bestLapLeader = rows
            .filter(r => r.best_lap_ms > 0)
            .reduce((best, r) => (!best || r.best_lap_ms < best.best_lap_ms) ? r : best, null);
        const bestOverallLapMs = bestLapLeader ? bestLapLeader.best_lap_ms : 0;

        tbody.innerHTML = rows.map(r => {
            const isRelay = r.category === 'Эстафета';
            const badgeClass = isRelay ? 'tri-badge--relay' : 'tri-badge--personal';
            const categoryLabel = isRelay ? 'Эстафета' : 'Личный';

            // Бейдж отставания в гонке
            const gapBadge = r.gap === '—'
                ? `<span class="tri-gap-badge tri-gap-badge--leader">Лидер</span>`
                : `<span class="tri-gap-badge tri-gap-badge--behind">${r.gap}</span>`;

            // Отставание на последнем круге + подсказка лидера
            let lapGapHtml = '—';
            if (r.laps_completed > 0 && r.last_lap_ms > 0 && lastLapLeader) {
                const delta = r.last_lap_ms - lastLapLeader.last_lap_ms;
                if (delta <= 0) {
                    lapGapHtml = `<span class="tri-gap-badge tri-gap-badge--leader">Лидер</span>`;
                } else {
                    lapGapHtml = `<span class="tri-gap--behind">+${fmtMs(delta)}</span>
                        <span class="tri-lap-gap-hint">лучший: ${lastLapLeader.surname}, ${fmtMs(lastLapLeader.last_lap_ms)}</span>`;
                }
            }

            // Отставание на лучшем круге + подсказка лидера
            let bestGapHtml = '—';
            if (r.best_lap_ms > 0 && bestLapLeader) {
                const delta = r.best_lap_ms - bestLapLeader.best_lap_ms;
                if (delta <= 0) {
                    bestGapHtml = `<span class="tri-gap-badge tri-gap-badge--leader">Лидер</span>`;
                } else {
                    bestGapHtml = `<span class="tri-gap--behind">+${fmtMs(delta)}</span>
                        <span class="tri-lap-gap-hint">лучший: ${bestLapLeader.surname}, ${fmtMs(bestLapLeader.best_lap_ms)}</span>`;
                }
            }

            return `
            <tr id="p-${r.id}" class="tri-row-main" onclick="toggleDetail(this)">
                <td class="tri-rank">${r.rank}</td>
                <td class="tri-name">${r.surname} ${r.name}<span class="tri-chevron">▼</span></td>
                <td><span class="tri-badge ${badgeClass}">${categoryLabel}</span></td>
                <td>${parseFloat(r.total_km).toFixed(1)}</td>
                <td>${r.laps_completed}</td>
                <td class="tri-speed">${parseFloat(r.avg_speed_kmh).toFixed(1)} км/ч</td>
                <td>${gapBadge}</td>
            </tr>
            <tr class="tri-row-detail">
                <td colspan="7">
                    <div class="tri-detail-tabs">
                        <button class="tri-detail-tab active" onclick="switchLapTab(this, 'last-${r.id}', 'best-${r.id}')">Последний круг</button>
                        <button class="tri-detail-tab" onclick="switchLapTab(this, 'best-${r.id}', 'last-${r.id}')">Лучший круг</button>
                    </div>
                    <div id="last-${r.id}" class="tri-detail-inner">
                        <div class="tri-detail-item">
                            <span class="tri-detail-label">Последний круг</span>
                            <span class="tri-detail-value">${r.laps_completed > 0 ? `№${r.laps_completed}` : '—'}</span>
                        </div>
                        <div class="tri-detail-item">
                            <span class="tri-detail-label">Время круга</span>
                            <span class="tri-detail-value" style="font-variant-numeric:tabular-nums">${fmtMs(r.last_lap_ms)}</span>
                        </div>
                        <div class="tri-detail-item">
                            <span class="tri-detail-label">Скорость круга</span>
                            <span class="tri-detail-value">${lapSpeed(r.last_lap_ms)}</span>
                        </div>
                        <div class="tri-detail-item">
                            <span class="tri-detail-label">Отставание на круге</span>
                            <span class="tri-detail-value">${lapGapHtml}</span>
                        </div>
                    </div>
                    <div id="best-${r.id}" class="tri-detail-inner" style="display:none">
                        <div class="tri-detail-item">
                            <span class="tri-detail-label">Лучший круг</span>
                            <span class="tri-detail-value">${r.best_lap_number > 0 ? `№${r.best_lap_number}` : '—'}</span>
                        </div>
                        <div class="tri-detail-item">
                            <span class="tri-detail-label">Время круга</span>
                            <span class="tri-detail-value" style="font-variant-numeric:tabular-nums">${fmtMs(r.best_lap_ms)}</span>
                        </div>
                        <div class="tri-detail-item">
                            <span class="tri-detail-label">Скорость круга</span>
                            <span class="tri-detail-value">${lapSpeed(r.best_lap_ms)}</span>
                        </div>
                        <div class="tri-detail-item">
                            <span class="tri-detail-label">Отставание на круге</span>
                            <span class="tri-detail-value">${bestGapHtml}</span>
                        </div>
                    </div>
                </td>
            </tr>`;
        }).join('');
    }

    function toggleDetail(mainRow) {
        const detailRow = mainRow.nextElementSibling;
        const isOpen = mainRow.classList.contains('open');
        document.querySelectorAll('.tri-row-main.open').forEach(row => {
            row.classList.remove('open');
            row.nextElementSibling.classList.remove('open');
        });
        if (!isOpen) {
            mainRow.classList.add('open');
            detailRow.classList.add('open');
        }
    }

    async function loadLaps() {
        try {
            const r = await fetch('/api/tri/laps');
            const data = await r.json();
            allLaps = data.laps || [];
            renderSplits();
        } catch(e) { console.error('laps error', e); }
    }

    function onSlider() {
        const fromH = parseInt(document.getElementById('from-slider').value);
        let toH = parseInt(document.getElementById('to-slider').value);
        if (toH < fromH) { toH = fromH; document.getElementById('to-slider').value = fromH; }
        document.getElementById('from-val').textContent = fromH;
        document.getElementById('to-val').textContent = toH;
        renderSplits();
    }

    function renderSplits() {
        const fromH  = parseInt(document.getElementById('from-slider').value);
        const toH    = parseInt(document.getElementById('to-slider').value);
        const fromMs = (fromH - 1) * 3600000;
        const toMs   = toH * 3600000;
        const durationH = toH - fromH + 1;

        // Индекс участников из standings для категории и зачёта
        const standingsMap = {};
        for (const s of allStandings) standingsMap[s.id] = s;

        // Считаем круги в периоде по участнику (только отфильтрованные)
        const byParticipant = {};
        for (const lap of allLaps) {
            if (!filteredPids.has(lap.participant_id)) continue;
            if (lap.cumulative_ms > fromMs && lap.cumulative_ms <= toMs) {
                const pid = lap.participant_id;
                if (!byParticipant[pid]) {
                    byParticipant[pid] = { pid, surname: lap.surname, name: lap.name, count: 0 };
                }
                byParticipant[pid].count++;
            }
        }

        const rows = Object.values(byParticipant).sort((a, b) => b.count - a.count);
        const tbody = document.getElementById('splits-body');
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--tri-muted);padding:16px">Нет кругов в выбранном диапазоне</td></tr>';
            return;
        }

        const leader = rows[0];
        tbody.innerHTML = rows.map((r, i) => {
            const s = standingsMap[r.pid] || {};
            const isRelay = s.category === 'Эстафета';
            const badgeClass = isRelay ? 'tri-badge--relay' : 'tri-badge--personal';
            const categoryLabel = isRelay ? 'Эстафета' : 'Личный';
            const speed = (r.count * LAP_KM / durationH).toFixed(1);
            const km = (r.count * LAP_KM).toFixed(1);

            let gapBadge;
            if (i === 0) {
                gapBadge = `<span class="tri-gap-badge tri-gap-badge--leader">Лидер</span>`;
            } else {
                const diff = leader.count - r.count;
                const label = diff === 1 ? '−1 круг' : (diff <= 4 ? `−${diff} круга` : `−${diff} кругов`);
                gapBadge = `<span class="tri-gap-badge tri-gap-badge--behind">${label}</span>`;
            }

            return `<tr>
                <td class="tri-rank">${i + 1}</td>
                <td class="tri-name">${r.surname} ${r.name}</td>
                <td><span class="tri-badge ${badgeClass}">${categoryLabel}</span></td>
                <td>${km}</td>
                <td>${r.count}</td>
                <td class="tri-speed">${speed} км/ч</td>
                <td>${gapBadge}</td>
            </tr>`;
        }).join('');
    }

    loadStandings();
    loadLaps();
    setInterval(() => { loadStandings(); loadLaps(); }, 30000);
    </script>
</body>
</html>
