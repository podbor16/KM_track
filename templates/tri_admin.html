<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triatleta — Управление</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon_tri_dark.ico" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/x-icon" href="/static/images/favicon_tri_light.ico" media="(prefers-color-scheme: dark)">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/tri_results.css?v={{ v }}">
</head>
<body>
    <div class="tri-header">
        <div>
            <div class="tri-header__eyebrow">Triatleta · Управление</div>
            <div class="tri-header__title">Панель управления</div>
            <div class="tri-header__meta"><a href="/24h" style="color:var(--tri-accent)">← Live результаты</a></div>
        </div>
        <a href="/logout" class="logout-btn">Выйти</a>
    </div>

    <div class="tri-container">
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('loader', this)">Загрузчик</button>
            <button class="admin-tab" onclick="switchTab('preset', this)">Пресет Copernico</button>
            <button class="admin-tab" onclick="switchTab('post', this)">📋 Пост</button>
        </div>

        <!-- Загрузчик -->
        <div id="tab-loader" class="tab-pane active">
            <div class="admin-section-note">
                Управление сервисом <code>km_tri_loader@tri_24h</code> на сервере.
            </div>
            <div id="loader-wrap">
                <div class="admin-loading">Загрузка статуса...</div>
            </div>
        </div>

        <!-- Пост -->
        <div id="tab-post" class="tab-pane">
            <div class="admin-section-note">
                Автогенерация текста для поста в соцсетях по текущим данным гонки.
            </div>
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
                <button class="adm-btn adm-btn--start" onclick="generateAndShow()">Сгенерировать</button>
                <button class="adm-btn adm-btn--edit" id="btn-copy" onclick="copyPost()" style="display:none">Копировать</button>
                <span id="copy-ok" style="display:none;color:var(--tri-green);font-size:13px">✓ Скопировано!</span>
            </div>
            <textarea id="post-preview" readonly
                style="width:100%;height:520px;font-family:monospace;font-size:13px;line-height:1.6;
                       border:1px solid var(--tri-border);border-radius:8px;padding:14px;
                       background:var(--tri-surface);color:var(--tri-text);resize:vertical;display:none"></textarea>
        </div>

        <!-- Пресет -->
        <div id="tab-preset" class="tab-pane">
            <div id="preset-wrap">
                <div class="admin-loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
    function switchTab(name, btn) {
        document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
        if (name === 'preset') loadPreset();
    }

    // ---- Загрузчик ----

    async function loadLoader() {
        const wrap = document.getElementById('loader-wrap');
        try {
            const r = await fetch('/api/tri/admin/loader');
            if (!r.ok) throw new Error(await r.text());
            const loaders = await r.json();
            wrap.innerHTML = '';
            if (!loaders.length) {
                wrap.innerHTML = '<div class="admin-loading">Нет данных загрузчика</div>';
                return;
            }
            const table = document.createElement('table');
            table.className = 'admin-loader-table';
            table.innerHTML = `
                <thead><tr>
                    <th>Имя</th><th>Статус</th><th>Действия</th>
                </tr></thead>
                <tbody></tbody>`;
            loaders.forEach(l => table.querySelector('tbody').appendChild(buildLoaderRow(l)));
            wrap.appendChild(table);
        } catch(e) {
            wrap.innerHTML = `<div class="admin-error">Ошибка: ${e.message}</div>`;
        }
    }

    function buildLoaderRow(l) {
        const tr = document.createElement('tr');
        const isActive = l.status === 'active';
        tr.innerHTML = `
            <td><code>${l.name}</code></td>
            <td><span class="admin-badge ${isActive ? 'admin-badge--active' : 'admin-badge--inactive'}">${isActive ? 'active' : 'inactive'}</span></td>
            <td style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
                <button class="adm-btn adm-btn--start btn-start" ${isActive ? 'disabled' : ''}>Start</button>
                <button class="adm-btn adm-btn--stop btn-stop" ${!isActive ? 'disabled' : ''}>Stop</button>
                <button class="adm-btn adm-btn--init btn-init" title="Первичная загрузка участников из Copernico">Инициализация</button>
                <button class="adm-btn adm-btn--sync btn-sync" title="Принудительно перезаписать круги из Copernico (исправляет ошибки хронометража)">↻ Пересинхронизировать</button>
                <span class="init-result" style="display:none"></span>
            </td>`;

        tr.querySelector('.btn-start').addEventListener('click', () => loaderAction('start', tr));
        tr.querySelector('.btn-stop').addEventListener('click', () => loaderAction('stop', tr));
        tr.querySelector('.btn-init').addEventListener('click', () => loaderInit(tr));
        tr.querySelector('.btn-sync').addEventListener('click', () => loaderSync(tr));
        return tr;
    }

    async function loaderAction(action, tr) {
        const btnStart = tr.querySelector('.btn-start');
        const btnStop  = tr.querySelector('.btn-stop');
        const btnInit  = tr.querySelector('.btn-init');
        btnStart.disabled = true;
        btnStop.disabled  = true;
        btnInit.disabled  = true;
        try {
            const r = await fetch(`/api/tri/admin/loader/${action}`, {method: 'POST'});
            const d = await r.json();
            if (d.output) console.log(`loader ${action}:`, d.output);
        } catch(e) {
            alert('Ошибка: ' + e.message);
        }
        await new Promise(r => setTimeout(r, 1500));
        loadLoader();
    }

    async function loaderInit(tr) {
        const btn    = tr.querySelector('.btn-init');
        const result = tr.querySelector('.init-result');
        const btnStart = tr.querySelector('.btn-start');
        const btnStop  = tr.querySelector('.btn-stop');

        btn.disabled = true;
        btnStart.disabled = true;
        btnStop.disabled  = true;
        btn.textContent = 'Загрузка...';
        result.style.display = 'none';

        try {
            const r = await fetch('/api/tri/admin/loader/init', {method: 'POST'});
            const d = await r.json();
            result.style.display = 'inline';
            if (d.status === 'ok') {
                result.style.color = 'var(--tri-green)';
                result.textContent = `✓ Вставлено: ${d.inserted}`;
            } else {
                result.style.color = 'var(--tri-red)';
                result.textContent = '✗ Ошибка';
                console.error('Init error:', d.output);
            }
        } catch(e) {
            result.style.display = 'inline';
            result.style.color = 'var(--tri-red)';
            result.textContent = `✗ ${e.message}`;
        }

        btn.textContent = 'Инициализация';
        btn.disabled = false;
        loadLoader();
    }

    async function loaderSync(tr) {
        const btn    = tr.querySelector('.btn-sync');
        const result = tr.querySelector('.init-result');
        btn.disabled = true;
        btn.textContent = 'Синхронизация...';
        result.style.display = 'none';
        try {
            const r = await fetch('/api/tri/admin/loader/resync', {method: 'POST'});
            const d = await r.json();
            result.style.display = 'inline';
            if (d.status === 'ok') {
                result.style.color = 'var(--tri-green)';
                result.textContent = `✓ Вставлено кругов: ${d.inserted}`;
            } else {
                result.style.color = 'var(--tri-red)';
                result.textContent = '✗ Ошибка';
                console.error('Resync error:', d.output);
            }
        } catch(e) {
            result.style.display = 'inline';
            result.style.color = 'var(--tri-red)';
            result.textContent = `✗ ${e.message}`;
        }
        btn.textContent = '↻ Пересинхронизировать';
        btn.disabled = false;
    }

    loadLoader();
    setInterval(loadLoader, 10000);

    // ---- Пресет ----

    let _presetLoaded = false;

    async function loadPreset() {
        if (_presetLoaded) return;
        _presetLoaded = true;

        const wrap = document.getElementById('preset-wrap');
        try {
            const r = await fetch('/api/tri/admin/preset');
            const d = await r.json();
            if (!r.ok) {
                wrap.innerHTML = `<div class="admin-error">Ошибка: ${d.detail || r.status}</div>`;
                return;
            }
            wrap.innerHTML = '';
            wrap.appendChild(buildPresetCard('tri_24h_2026', d.yaml));
        } catch(e) {
            wrap.innerHTML = `<div class="admin-error">Ошибка: ${e.message}</div>`;
        }
    }

    function buildPresetCard(name, yamlContent) {
        const card = document.createElement('div');
        card.className = 'admin-card';
        card.innerHTML = `
            <div class="admin-card__head">
                <div class="admin-card__title">${name}.yaml</div>
                <button class="adm-btn adm-btn--edit btn-edit">Редактировать</button>
            </div>
            <div class="admin-editor" style="display:none">
                <div class="admin-editor__error" style="display:none"></div>
                <textarea class="admin-yaml-editor" spellcheck="false"></textarea>
                <div class="admin-editor__actions">
                    <button class="adm-btn adm-btn--save btn-save">Сохранить</button>
                    <button class="adm-btn adm-btn--cancel btn-cancel">Отмена</button>
                </div>
            </div>`;

        const btnEdit = card.querySelector('.btn-edit');
        const editor  = card.querySelector('.admin-editor');
        const textarea = card.querySelector('.admin-yaml-editor');
        const errBox  = card.querySelector('.admin-editor__error');

        textarea.value = yamlContent;

        btnEdit.addEventListener('click', () => {
            if (editor.style.display !== 'none') {
                editor.style.display = 'none';
                btnEdit.textContent = 'Редактировать';
            } else {
                editor.style.display = '';
                btnEdit.textContent = 'Свернуть';
                errBox.style.display = 'none';
            }
        });

        card.querySelector('.btn-cancel').addEventListener('click', () => {
            editor.style.display = 'none';
            btnEdit.textContent = 'Редактировать';
        });

        card.querySelector('.btn-save').addEventListener('click', async () => {
            const btnSave = card.querySelector('.btn-save');
            btnSave.disabled = true;
            btnSave.textContent = 'Сохранение...';
            errBox.style.display = 'none';
            try {
                const r = await fetch('/api/tri/admin/preset', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({yaml: textarea.value}),
                });
                const d = await r.json();
                if (r.ok) {
                    editor.style.display = 'none';
                    btnEdit.textContent = 'Редактировать';
                } else {
                    errBox.textContent = d.detail || 'Ошибка сохранения';
                    errBox.style.display = '';
                }
            } catch(e) {
                errBox.textContent = 'Ошибка сети: ' + e.message;
                errBox.style.display = '';
            } finally {
                btnSave.disabled = false;
                btnSave.textContent = 'Сохранить';
            }
        });

        return card;
    }

    // ---- Генератор поста ----

    const GUN_UTC_MS = new Date('2026-06-25T13:00:00Z').getTime();

    function _lapWord(n) {
        const abs = Math.abs(n);
        const mod10 = abs % 10, mod100 = abs % 100;
        if (mod100 >= 11 && mod100 <= 14) return 'кругов';
        if (mod10 === 1) return 'круг';
        if (mod10 >= 2 && mod10 <= 4) return 'круга';
        return 'кругов';
    }

    function _fmtKm(km)    { return parseFloat(km).toFixed(2).replace('.', ','); }
    function _fmtSpeed(s)  { return parseFloat(s).toFixed(2).replace('.', ','); }

    const CITIES = {
        'Бурдин Игорь':       'Красноярск',
        'Захаренков Илья':    'Красногорск',
        'Умнов Михаил':       'Чебоксары',
        'Подлесный Валерий':  'Красноярск',
        'Ребенков Владимир':  'Салехард',
        'Кондратюк Александр': 'Иркутск',
        'Прокофьева Елена':   'Красноярск',
    };

    function _entry(p, rank, leader, isRelay) {
        const teamName = p.team_name || p.surname;
        const members  = p.team_name ? `${p.surname} ${p.name}`.trim() : p.name;
        const fullName = `${p.surname} ${p.name}`;
        const city = !isRelay && CITIES[fullName] ? ` (${CITIES[fullName]})` : '';
        const displayName = isRelay
            ? `Команда ${teamName}. ${members}`
            : `${fullName}${city}`;

        const km = _fmtKm(p.total_km);

        let line2;
        if (rank === 1 || p.laps_completed === 0) {
            line2 = `🏁 ${km} км | ⏱️ Ср. скорость: ${_fmtSpeed(p.avg_speed_kmh)} км/ч`;
        } else {
            const lapDiff = leader.laps_completed - p.laps_completed;
            const kmDiff  = parseFloat(leader.total_km) - parseFloat(p.total_km);
            if (lapDiff > 0) {
                line2 = `🏁 ${km} км | Отставание: -${lapDiff} ${_lapWord(lapDiff)}`;
            } else {
                // одинаковое кол-во кругов — разница во времени
                const secDiff = Math.round((p.elapsed_ms - leader.elapsed_ms) / 1000);
                const mm = Math.floor(secDiff / 60), ss = secDiff % 60;
                line2 = `🏁 ${km} км | +${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')} (ср. скорость: ${_fmtSpeed(p.avg_speed_kmh)} км/ч)`;
            }
        }
        return `${rank}. ${displayName}\n${line2}`;
    }

    async function generateAndShow() {
        const ta  = document.getElementById('post-preview');
        const btn = document.getElementById('btn-copy');
        const ok  = document.getElementById('copy-ok');
        ta.value = 'Загрузка...';
        ta.style.display = '';
        btn.style.display = 'none';
        ok.style.display  = 'none';

        try {
            const r = await fetch('/api/tri/standings');
            if (!r.ok) throw new Error(await r.text());
            const { standings } = await r.json();

            const elapsedMs   = Math.max(0, Date.now() - GUN_UTC_MS);
            const totalMin    = Math.floor(elapsedMs / 60000);
            const elapsedH    = Math.floor(totalMin / 60);
            const elapsedMin  = totalMin % 60;
            const elapsedLabel = elapsedMin ? `${elapsedH} ч ${elapsedMin} мин` : `${elapsedH} ч`;

            // Индивидуальные: абсолютный рейтинг (без эстафет), потом разбиваем по полу
            const individual = standings.filter(p => p.category !== 'Эстафета');
            const men   = individual.filter(p => p.gender === 'Мужчина');
            const women = individual.filter(p => p.gender === 'Женщина');
            const relays = standings.filter(p => p.category === 'Эстафета');

            // Пачечный ранг: ±3 сек с одинаковым числом кругов → одно место
            function packRanks(arr) {
                const ranks = [];
                for (let i = 0; i < arr.length; i++) {
                    if (i === 0) { ranks.push(1); continue; }
                    const prev = arr[i - 1];
                    const sameLaps = arr[i].laps_completed === prev.laps_completed;
                    const inPack = sameLaps && Math.abs(arr[i].elapsed_ms - prev.elapsed_ms) <= 3000;
                    ranks.push(inPack ? ranks[i - 1] : i + 1);
                }
                return ranks;
            }

            // Абсолютное место среди индивидуальных (для женщин) — с пачечным рангом
            const indRanks = packRanks(individual);
            const absRank = {};
            individual.forEach((p, i) => { absRank[p.id] = indRanks[i]; });

            let text = `**Промежуточные результаты после ${elapsedLabel} из 24 часов суточной велогонки:**\n`;

            if (men.length) {
                const menRanks = packRanks(men);
                text += `\n**🏆 ИНДИВИДУАЛЬНЫЙ ЗАЧЕТ. МУЖЧИНЫ:**\n\n`;
                text += men.map((p, i) => _entry(p, menRanks[i], men[0], false)).join('\n\n');
            }

            if (women.length) {
                const womenRanks = packRanks(women);
                text += `\n\n**🏆 ЖЕНСКИЙ ЗАЧЁТ:**\n\n`;
                text += women.map((p, i) => {
                    const entry = _entry(p, womenRanks[i], women[0], false);
                    return entry + `\n(${absRank[p.id]} место в индивидуальном абсолюте)`;
                }).join('\n\n');
            }

            if (relays.length) {
                const relayRanks = packRanks(relays);
                text += `\n\n**🤝 ЭСТАФЕТЫ:**\n\n`;
                text += relays.map((p, i) => _entry(p, relayRanks[i], relays[0], true)).join('\n\n');
            }

            if (!standings.length) text = 'Нет данных — участники ещё не загружены.';

            text += '\n\n🔗 Лайв-результаты: https://live-race.triatleta.ru/24h';

            ta.value = text;
            btn.style.display = '';
        } catch(e) {
            ta.value = 'Ошибка: ' + e.message;
        }
    }

    async function copyPost() {
        const ta = document.getElementById('post-preview');
        const ok = document.getElementById('copy-ok');
        try {
            await navigator.clipboard.writeText(ta.value);
            ok.style.display = '';
            setTimeout(() => { ok.style.display = 'none'; }, 2000);
        } catch(e) {
            ta.select();
            document.execCommand('copy');
            ok.style.display = '';
            setTimeout(() => { ok.style.display = 'none'; }, 2000);
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Tab' && e.target.classList.contains('admin-yaml-editor')) {
            e.preventDefault();
            const ta = e.target;
            const s = ta.selectionStart, en = ta.selectionEnd;
            ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(en);
            ta.selectionStart = ta.selectionEnd = s + 2;
        }
    });
    </script>
</body>
</html>
