<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triatleta — Управление</title>
    <link rel="stylesheet" href="/static/css/tri_results.css?v={{ v }}">
    <style>
        .admin-tabs { display: flex; gap: 4px; margin: 24px 0 16px; }
        .admin-tab {
            padding: 8px 20px; border: 1px solid var(--tri-border); border-radius: 6px;
            background: none; color: var(--tri-muted); cursor: pointer; font-size: 14px; font-weight: 600;
        }
        .admin-tab.active { background: var(--tri-accent); color: #000; border-color: var(--tri-accent); }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .admin-card {
            background: var(--tri-surface); border: 1px solid var(--tri-border);
            border-radius: 8px; padding: 24px; max-width: 600px;
        }
        .admin-card__title { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--tri-accent); }
        .status-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; }
        .badge--active   { background: rgba(63,185,80,0.2);  color: var(--tri-green); }
        .badge--inactive { background: rgba(248,81,73,0.15); color: var(--tri-red); }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn {
            padding: 9px 20px; border-radius: 6px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
        }
        .btn:disabled { opacity: 0.4; cursor: default; }
        .btn--start   { background: var(--tri-green); color: #000; }
        .btn--stop    { background: var(--tri-surface); border: 1px solid var(--tri-border); color: var(--tri-text); }
        .btn--restart { background: var(--tri-accent); color: #000; }
        .btn--save    { background: var(--tri-accent); color: #000; }
        .result-msg { margin-top: 12px; font-size: 13px; color: var(--tri-muted); min-height: 20px; }
        .result-msg.ok  { color: var(--tri-green); }
        .result-msg.err { color: var(--tri-red); }

        textarea.yaml-editor {
            width: 100%; height: 260px; background: #0d1117; color: var(--tri-text);
            border: 1px solid var(--tri-border); border-radius: 6px; padding: 12px;
            font-family: "Courier New", monospace; font-size: 13px; line-height: 1.5;
            resize: vertical;
        }

        .logout-btn {
            padding: 7px 16px; background: transparent; border: 1px solid var(--tri-border);
            border-radius: 4px; color: var(--tri-muted); font-size: 13px; cursor: pointer; text-decoration: none;
        }
        .logout-btn:hover { border-color: var(--tri-accent); color: var(--tri-accent); }
    </style>
</head>
<body>
    <div class="tri-header">
        <div>
            <div class="tri-header__title">🔧 Triatleta — Управление</div>
            <div class="tri-header__meta"><a href="/tri" style="color:var(--tri-accent)">← Live результаты</a></div>
        </div>
        <a href="/logout" class="logout-btn">Выйти</a>
    </div>

    <div class="tri-container">
        <div class="admin-tabs">
            <button class="admin-tab active" onclick="switchTab('loader', this)">Загрузчик</button>
            <button class="admin-tab" onclick="switchTab('preset', this)">Пресет Copernico</button>
        </div>

        <!-- Загрузчик -->
        <div id="tab-loader" class="tab-pane active">
            <div class="admin-card">
                <div class="admin-card__title">km_tri_loader@tri_24h</div>
                <div class="status-row">
                    Статус: <span class="badge badge--inactive" id="status-badge">загрузка...</span>
                </div>
                <div class="btn-row">
                    <button class="btn btn--start"   id="btn-start"   onclick="loaderAction('start')">Start</button>
                    <button class="btn btn--stop"     id="btn-stop"    onclick="loaderAction('stop')">Stop</button>
                    <button class="btn btn--restart"  id="btn-restart" onclick="loaderAction('restart')">Restart</button>
                </div>
                <div class="result-msg" id="loader-msg"></div>
            </div>
        </div>

        <!-- Пресет -->
        <div id="tab-preset" class="tab-pane">
            <div class="admin-card">
                <div class="admin-card__title">tri_24h_2026.yaml</div>
                <textarea class="yaml-editor" id="preset-yaml" spellcheck="false"></textarea>
                <div class="btn-row" style="margin-top:12px">
                    <button class="btn btn--save" onclick="savePreset()">Сохранить</button>
                </div>
                <div class="result-msg" id="preset-msg"></div>
            </div>
        </div>
    </div>

    <script>
    function switchTab(name, btn) {
        document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + name).classList.add('active');
        if (name === 'preset') loadPreset();
    }

    // ---- Загрузчик ----
    async function loadStatus() {
        try {
            const r = await fetch('/api/tri/admin/loader');
            const d = await r.json();
            const isActive = d.status === 'active';
            const badge = document.getElementById('status-badge');
            badge.textContent = isActive ? 'active' : 'inactive';
            badge.className = 'badge ' + (isActive ? 'badge--active' : 'badge--inactive');
            document.getElementById('btn-start').disabled = isActive;
            document.getElementById('btn-stop').disabled = !isActive;
        } catch(e) {
            document.getElementById('status-badge').textContent = 'ошибка';
        }
    }

    async function loaderAction(action) {
        const msg = document.getElementById('loader-msg');
        msg.textContent = 'Выполняется...';
        msg.className = 'result-msg';
        ['btn-start','btn-stop','btn-restart'].forEach(id => document.getElementById(id).disabled = true);
        try {
            const r = await fetch(`/api/tri/admin/loader/${action}`, {method: 'POST'});
            const d = await r.json();
            msg.textContent = d.status === 'ok' ? `✓ ${action} выполнен` : `✗ Ошибка: ${d.output || ''}`;
            msg.className = 'result-msg ' + (d.status === 'ok' ? 'ok' : 'err');
        } catch(e) {
            msg.textContent = '✗ ' + e.message;
            msg.className = 'result-msg err';
        }
        // Пауза перед проверкой статуса — сервис должен успеть запуститься
        await new Promise(r => setTimeout(r, 2000));
        await loadStatus();
    }

    loadStatus();
    setInterval(loadStatus, 10000);

    // ---- Пресет ----
    async function loadPreset() {
        const ta = document.getElementById('preset-yaml');
        ta.value = 'Загрузка...';
        try {
            const r = await fetch('/api/tri/admin/preset');
            const d = await r.json();
            if (!r.ok) { ta.value = 'Ошибка: ' + (d.detail || r.status); return; }
            ta.value = d.yaml;
        } catch(e) {
            ta.value = 'Ошибка: ' + e.message;
        }
    }

    async function savePreset() {
        const msg = document.getElementById('preset-msg');
        const content = document.getElementById('preset-yaml').value;
        msg.textContent = 'Сохранение...';
        msg.className = 'result-msg';
        try {
            const r = await fetch('/api/tri/admin/preset', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({yaml: content}),
            });
            const d = await r.json();
            if (r.ok) {
                msg.textContent = '✓ Сохранено';
                msg.className = 'result-msg ok';
            } else {
                msg.textContent = '✗ ' + (d.detail || 'Ошибка');
                msg.className = 'result-msg err';
            }
        } catch(e) {
            msg.textContent = '✗ ' + e.message;
            msg.className = 'result-msg err';
        }
    }

    // Tab в textarea → 2 пробела
    document.getElementById('preset-yaml').addEventListener('keydown', e => {
        if (e.key === 'Tab') {
            e.preventDefault();
            const ta = e.target;
            const s = ta.selectionStart, en = ta.selectionEnd;
            ta.value = ta.value.substring(0, s) + '  ' + ta.value.substring(en);
            ta.selectionStart = ta.selectionEnd = s + 2;
        }
    });
    </script>
</body>
</html>
