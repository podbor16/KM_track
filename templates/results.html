<!-- legacy/templates/results.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Результаты забега</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="/static/css/krasmarafon-header.css?v=1">
    <link rel="stylesheet" href="/static/css/navigation.css?v=2">
    <link rel="stylesheet" href="/static/css/analytics.css?v=12">
    <link rel="stylesheet" href="/static/css/krasmarafon-footer.css?v=1">

</head>
<body>
    <!-- Включаем хэдер Красмарафона -->
    {% include 'krasmarafon_header.html' %}
    {% include 'header.html' %}

    <div class="km-page">
      <h1 id="pageTitle">Результаты забега</h1>

      <div class="km-event-card" id="eventCard">
        <div class="km-event-card__overlay"></div>
        <div class="km-event-card__controls">
          <div class="km-select-group">
            <label class="km-label">Событие:</label>
            <select id="eventResultsSelector" onchange="switchEventResults()" class="km-select">
              <option value="night_run">Ночной забег</option>
              <option value="vesna">Весна</option>
              <option value="colorrun">Красочный забег</option>
              <option value="girlseven">Женская семерка</option>
              <option value="zhara">Жара</option>
              <option value="kids">Детский забег</option>
              <option value="xtrailrun">Х Трейл</option>
              <option value="snow7">Снежная семерка</option>
              <option value="pervomay">Первомайский полумарафон</option>
            </select>
          </div>
          <div class="km-select-group">
            <label class="km-label">Год:</label>
            <select id="yearResultsSelector" onchange="switchEventResults()" class="km-select km-select--year">
            </select>
          </div>
        </div>
      </div>

      <div class="km-toolbar">
        <div class="km-filters">
          <div class="km-filter-group">
            <label class="km-label" for="genderFilter">Пол:</label>
            <select id="genderFilter" onchange="onGenderChange()" class="km-select">
              <option value="">Все</option>
              <option value="Мужчина">Мужчина</option>
              <option value="Женщина">Женщина</option>
            </select>
          </div>
          <div class="km-filter-group" id="ageGroupFilterGroup">
            <label class="km-label" for="ageGroupFilter">Возр. группа:</label>
            <select id="ageGroupFilter" onchange="applyFilters()" class="km-select"></select>
          </div>
          <div class="km-filter-group" id="distanceFilterGroup">
            <label class="km-label" for="distanceFilter">Дистанция:</label>
            <select id="distanceFilter" onchange="applyFilters()" class="km-select"></select>
          </div>
        </div>
        <div class="km-filter-group km-search-group">
          <label class="km-label" for="surnameSearch">Поиск:</label>
          <input type="text" id="surnameSearch" placeholder="Введите фамилию..."
                 onkeyup="applyFilters()" class="km-input">
        </div>
      </div>

      <div id="loadingIndicator" class="km-loading" style="display:none">Загрузка данных...</div>
      <div id="errorIndicator" class="km-error" style="display:none"></div>
      <div id="segmentTabsContainer" class="km-segment-tabs" style="display:none"></div>

      <div class="km-table-wrap" id="resultsWrapper">
        <table id="resultsTable" class="km-table">
          <thead>
            <tr>
              <th class="km-th km-th--c km-th--sort" onclick="sortTable('rank')">Место</th>
              <th class="km-th km-th--c km-th--sort" onclick="sortTable('bib')">№</th>
              <th class="km-th km-th--l km-th--sort" onclick="sortTable('name')">Фамилия и Имя</th>
              <th class="km-th km-th--c km-th--sort" onclick="sortTable('time_gun')">Офиц. время</th>
              <th class="km-th km-th--c km-th--sort" onclick="sortTable('time_net')">Чистое время</th>
            </tr>
          </thead>
          <tbody id="resultsTableBody"></tbody>
        </table>
      </div>

      <div class="km-table-wrap" id="segmentModeWrapper" style="display:none">
        <table id="segmentModeTable" class="km-table">
          <thead id="segmentModeHead"></thead>
          <tbody id="segmentModeBody"></tbody>
        </table>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="/static/js/utils.js?v=4"></script>
    <script src="/static/js/realtime.js?v=1"></script>
    <script src="/static/js/analytics-results.js?v=18"></script>

    <!-- Включаем официальный футер Красмарафона -->
    {% include 'krasmarafon_footer.html' %}
</body>
</html>
