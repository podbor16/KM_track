<!-- legacy/templates/tracker.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>{{ event_title }}</title>
    <link rel="icon" type="image/png" href="/static/images/krasmarafon-logo.png">
    <link rel="stylesheet" href="/static/lib/leaflet-1.9.4/leaflet.css"/>
    <link rel="stylesheet" href="/static/css/krasmarafon-header.css?v={{ v }}">
    <link rel="stylesheet" href="/static/css/navigation.css?v={{ v }}">
    <link rel="stylesheet" href="/static/css/tracker.css?v={{ v }}">
    <link rel="stylesheet" href="/static/css/krasmarafon-footer.css?v={{ v }}">
</head>
<body>
    <!-- Включаем хэдер Красмарафона -->
    {% include 'krasmarafon_header.html' %}
    {% include 'header.html' %}

    <div class="container">
        <div class="header">
            <h1 id="eventTitle">Трекер забега</h1>
        </div>

        <!-- Переключатель дистанций (скрыт если дистанция одна) -->
        <div id="distanceSwitcher" class="distance-switcher" style="display:none;"></div>

        <div id="runner-panel" class="runner-panel runner-panel--hidden">
            <button class="runner-panel__close" onclick="hideRunnerPanel()">✕</button>
            <div id="runner-panel-content"></div>
        </div>

        <div class="tracker-container">
            <div class="map-container">
                <div id="map"></div>
            </div>
            <div class="controls-panel">
                <!-- Поисковая строка и результаты -->
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Поиск по номеру или фамилии...">
                    <div class="search-results" id="searchResults"></div>
                </div>

                <!-- Контейнер для выбранных участников (между поиском и кнопками) -->
                <div class="selected-runners-container">
                    <div class="selected-title">
                        <div class="title-text">Отслеживаемые участники</div>
                        <div class="count-container">
                            (<span id="selectedCount">0</span>/ 5 )
                            <span id="selection-limit-warning" class="limit-warning" style="display: none;">
                                Достигнут лимит!
                            </span>
                        </div>
                    </div>
                    <div class="selected-list" id="selectedList">
                        <div class="empty-selection">Нет выбранных участников</div>
                    </div>
                </div>

                <!-- Кнопки (теперь в самом низу) -->
                <div class="controls-buttons">
                    <button class="control-btn primary" onclick="centerMap()">Центрировать карту</button>
                    <button class="control-btn secondary" onclick="clearSelection()">Очистить выбор</button>
                </div>
            </div>
        </div>

        <div class="status-panel" id="statusPanel">
            Загрузка данных...
        </div>

        <!-- Блок с аналитикой -->
        <div class="analytics-panel" id="analyticsPanel">
            <h2>Общая аналитика по забегу</h2>
            <div id="analyticsContent">
                <p>Загрузка аналитических данных...</p>
            </div>
        </div>
    </div>

    <script src="/static/lib/leaflet-1.9.4/leaflet.js"></script>
    <script>
        window.EVENT_CONFIG = {{ event_config | tojson }};
        console.log('Event config установлен:', window.EVENT_CONFIG);
    </script>
    <script src="/static/js/utils.js?v={{ v }}"></script>
    <script src="/static/js/realtime.js?v={{ v }}"></script>
    <script src="/static/js/tracker-api.js?v={{ v }}"></script>
    <script src="/static/js/tracker-search.js?v={{ v }}"></script>
    <script src="/static/js/tracker-map.js?v={{ v }}"></script>
    <script>
        console.log('Инициализация трекера для Event ID =', window.EVENT_CONFIG.id);
        CONFIG.EVENT_NAME = window.EVENT_CONFIG.code;
        CONFIG.EVENT_ID   = window.EVENT_CONFIG.id;
        setTimeout(() => { init(); }, 100);
    </script>

    <!-- Включаем официальный футер Красмарафона -->
    {% include 'krasmarafon_footer.html' %}
</body>
</html>
