<!-- legacy/templates/start_list.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Стартовый список</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="/static/css/krasmarafon-header.css?v=1">
    <link rel="stylesheet" href="/static/css/navigation.css?v=2">
    <link rel="stylesheet" href="/static/css/analytics.css?v=13">
    <link rel="stylesheet" href="/static/css/krasmarafon-footer.css?v=1">
</head>
<body>
    <!-- Включаем хэдер Красмарафона -->
    {% include 'krasmarafon_header.html' %}
    {% include 'header.html' %}

    <div class="km-page">
        <h1 id="pageTitle">Стартовый список</h1>

        <!-- Карточка события с фото и селектором -->
        <div class="km-event-card" id="eventCard">
            <div class="km-event-card__overlay"></div>
            <div class="km-event-card__controls">
                <div class="km-select-group">
                    <label class="km-label" for="eventSelector">Событие:</label>
                    <select id="eventSelector" onchange="switchEvent()" class="km-select">
                        <option value="night_run">Ночной забег</option>
                        <option value="vesna">Весна</option>
                        <option value="colorrun">Красочный забег</option>
                        <option value="girlseven">Женская семерка</option>
                        <option value="zhara">Жара</option>
                        <option value="kids">Детский забег</option>
                        <option value="xtrailrun">Х Трейл</option>
                        <option value="snow7">Снежная семерка</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="km-toolbar">
            <div class="km-filters">
                <div class="km-filter-group">
                    <label class="km-label" for="genderFilter">Пол:</label>
                    <select id="genderFilter" onchange="onGenderChange()" class="km-select">
                        <option value="">Все</option>
                        <option value="Мужчина">Мужчина</option>
                        <option value="Женщина">Женщина</option>
                    </select>
                </div>

                <div class="km-filter-group" id="ageGroupFilterGroup">
                    <label class="km-label" for="ageGroupFilter">Возрастная группа:</label>
                    <select id="ageGroupFilter" onchange="applyFilters()" class="km-select">
                        <!-- Возрастные группы будут заполнены динамически -->
                    </select>
                </div>

                <div class="km-filter-group" id="distanceFilterGroup">
                    <label class="km-label" for="distanceFilter">Дистанция:</label>
                    <select id="distanceFilter" onchange="applyFilters()" class="km-select">
                        <!-- Дистанции будут заполнены динамически -->
                    </select>
                </div>
            </div>
            <div class="km-filter-group km-search-group">
                <label class="km-label" for="surnameSearch">Поиск:</label>
                <input
                    type="text"
                    id="surnameSearch"
                    placeholder="Введите фамилию..."
                    onkeyup="applyFilters()"
                    class="km-input"
                >
            </div>
        </div>

        <div id="loadingIndicator" class="km-loading" style="display: none;">Загрузка данных...</div>
        <div id="errorIndicator" class="km-error" style="display: none;"></div>

        <!-- Контейнер для Стартового списка -->
        <div class="km-table-wrap" id="startListWrapper">
            <table id="startListTable" class="km-table">
                <thead>
                    <tr>
                        <th class="km-th km-th--c">№</th>
                        <th class="km-th km-th--l km-th--sort" onclick="sortTable('surname')">Фамилия</th>
                        <th class="km-th km-th--l km-th--sort" onclick="sortTable('name')">Имя</th>
                        <th class="km-th km-th--c km-th--sort" onclick="sortTable('birthday')">Год рождения</th>
                        <th class="km-th km-th--c km-th--sort" onclick="sortTable('distance')">Дистанция</th>
                        <th class="km-th km-th--c km-th--sort" onclick="sortTable('sex')">Пол</th>
                        <th class="km-th km-th--c km-th--sort" onclick="sortTable('category')">Возрастная группа</th>
                        <th class="km-th km-th--l km-th--sort" onclick="sortTable('city')">Город</th>
                        <th class="km-th km-th--l km-th--sort" onclick="sortTable('club')">Клуб</th>
                    </tr>
                </thead>
                <tbody id="startListBody">
                    <!-- Данные будут добавлены через JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="/static/js/utils.js?v=4"></script>
    <script src="/static/js/realtime.js?v=1"></script>
    <script src="/static/js/analytics-start-list.js?v=9"></script>

    <!-- Включаем официальный футер Красмарафона -->
    {% include 'krasmarafon_footer.html' %}
</body>
</html>
