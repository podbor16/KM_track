<!-- tracker_with_route.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Трекер Красмарафона - Маршрут и участники</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="map"></div>

    <div class="status-panel" id="statusPanel">
        <strong>Загрузка данных...</strong>
    </div>

    <div class="legend-panel">
        <div class="legend-title">Легенда</div>
        <div class="legend-item">
            <span class="legend-color blue"></span> Маршрут забега
        </div>
        <div class="legend-item">
            <span class="legend-color green"></span> Участники на трассе
        </div>
        <div class="legend-item">
            <span class="legend-color orange"></span> Лидеры
        </div>
        <div class="legend-item">
            <span class="legend-color red"></span> Финишировавшие
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <div class="info-title">Информация о забеге</div>
        <div class="info-row">
            <span class="info-label">Участников:</span>
            <span class="info-value" id="totalRunners">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">На трассе:</span>
            <span class="info-value" id="onTrack">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Финишировало:</span>
            <span class="info-value" id="finished">0</span>
        </div>
        <div class="info-row">
            <span class="info-label">Обновлено:</span>
            <span class="info-value" id="lastUpdate">-</span>
        </div>
    </div>

    <div class="controls">
        <button id="returnBtn" class="return">Центрировать карту</button>
        <button id="pauseBtn">Пауза обновлений</button>
        <button id="refreshBtn" class="return">Обновить сейчас</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        console.log('🚀 Запуск трекера Красмарафона');
        
        // ====== КОНФИГУРАЦИЯ ======
        const CONFIG = {
            API_URL: 'http://localhost:5000/api/runners',
            UPDATE_INTERVAL: 5000,
            OSM_WAY_ID: 181589417, // ID маршрута в OpenStreetMap
            BACKUP_TRACK: [
                [56.028855, 92.946101],
                [56.02996, 92.949893],
                [56.031108, 92.951328],
                [56.03227, 92.953744],
                [56.032565, 92.95492],
                [56.035519, 92.962478],
                [56.036558, 92.966651],
                [56.038971, 92.969956],
                [56.036558, 92.966651],
                [56.035519, 92.962478],
                [56.032565, 92.95492],
                [56.03227, 92.953744],
                [56.031108, 92.951328],
                [56.02996, 92.949893],
                [56.028855, 92.946101] // Последняя точка дублирует первую
            ]
        };

        // ====== ИНИЦИАЛИЗАЦИЯ КАРТЫ ======
        const map = L.map('map').setView([56.03266, 92.95386], 15);

        map.attributionControl.setPrefix('')
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // ====== ПЕРЕМЕННЫЕ ======
        let runners = {};
        let markers = {};
        let routeLine = null;
        let updateInterval = null;
        let isPaused = false;
        let raceTrack = CONFIG.BACKUP_TRACK; // По умолчанию используем резервный маршрут
        let isRouteLoaded = false;

        // ====== ФУНКЦИИ ЗАГРУЗКИ МАРШРУТА ======

        /**
         * Получение данных о маршруте из OpenStreetMap через Overpass API
         * С несколькими стратегиями загрузки для надежности
         */
        async function fetchRouteFromOSM(wayId) {
            console.log('🔄 Попытка загрузить маршрут из OpenStreetMap');
            document.getElementById('statusPanel').innerHTML = 
                '<strong>Загрузка маршрута из OpenStreetMap...</strong>';
            
            // Стратегия 1: Попытка прямого запроса (работает в некоторых браузерах)
            try {
                console.log('🔧 Стратегия 1: Прямой запрос к Overpass API');
                const url = `https://overpass-api.de/api/interpreter?data=[out:json];way(${wayId});(._;>;);out;`;
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Прямой запрос успешен');
                    return processRouteData(data);
                }
            } catch (error) {
                console.warn('⚠️ Стратегия 1 не сработала:', error.message);
            }
            
            // Если все стратегии не сработали
            throw new Error('Все методы загрузки маршрута не сработали');
        }
        
        /**
         * Обработка данных маршрута из API
         */
        function processRouteData(data) {
            // Извлекаем все узлы (nodes)
            const nodes = {};
            data.elements.forEach(element => {
                if (element.type === 'node') {
                    nodes[element.id] = [element.lat, element.lon];
                }
            });
            
            // Извлекаем координаты пути
            const way = data.elements.find(element => element.type === 'way' && element.id === CONFIG.OSM_WAY_ID);
            if (way && way.nodes) {
                // Преобразуем ссылки на узлы в координаты
                const coords = way.nodes.map(nodeId => nodes[nodeId]);
                
                console.log(`✅ Загружено ${coords.length} точек маршрута`);
                return coords;
            } else {
                throw new Error('Маршрут не найден в ответе API');
            }
        }

        // ====== ИНИЦИАЛИЗАЦИЯ МАРШРУТА ======

        /**
         * Инициализация маршрута на карте
         */
        function initializeRoute(track) {
            // Удаляем старый маршрут, если есть
            if (routeLine) {
                map.removeLayer(routeLine);
            }
            
            // Отрисовка маршрута
            routeLine = L.polyline(track, {
                color: '#2196F3',
                weight: 6,
                opacity: 0.8,
                dashArray: '10, 10'
            }).addTo(map);

            // Добавляем стартовую точку
            const startIcon = L.divIcon({
                className: 'start-marker',
                html: '<div style="background: green; border: 3px solid white; border-radius: 50%; width: 20px; height: 20px;"></div>',
                iconSize: [26, 26],
                iconAnchor: [13, 13]
            });

            L.marker(track[0], { icon: startIcon })
                .bindPopup('<strong>СТАРТ</strong><br>Начало забега')
                .addTo(map);

            // Добавляем финишную точку (только один финиш)
            const finishIcon = L.divIcon({
                className: 'finish-marker',
                html: '<div style="background: red; border: 3px solid white; border-radius: 50%; width: 20px; height: 20px;"></div>',
                iconSize: [26, 26],
                iconAnchor: [13, 13]
            });

            // Добавляем финиш только в конечной точке (предпоследней, если маршрут замкнут)
            const finishIndex = track.length > 1 && 
                track[0][0] === track[track.length-1][0] && 
                track[0][1] === track[track.length-1][1] ? 
                track.length - 2 : track.length - 1;
            
            L.marker(track[finishIndex], { icon: finishIcon })
                .bindPopup('<strong>ФИНИШ</strong><br>Конец забега')
                .addTo(map);

            // Центрируем карту на маршруте
            map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
            
            return track;
        }

        // ====== ОСНОВНЫЕ ФУНКЦИИ ======
        // ... остальные функции остаются без изменений (fetchRunnersData, createRunnerMarker, и т.д.) ...
        
        /**
         * Получение данных участников
         */
        async function fetchRunnersData() {
            try {
                console.log("🔄 Запрос данных участников...");
                document.getElementById('statusPanel').innerHTML = 
                    `<strong>Загрузка данных об участниках...</strong>`;
                
                const response = await fetch(CONFIG.API_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                console.log(`✅ Получено участников: ${data.length}`);
                return data;
            } catch (error) {
                console.error('❌ Ошибка при получении данных об участниках:', error);
                document.getElementById('statusPanel').innerHTML = 
                    `<strong style="color: red;">Ошибка загрузки участников: ${error.message}</strong>`;
                return [];
            }
        }

        /**
         * Создание маркера для участника
         */
        function createRunnerMarker(runner) {
            // Определяем цвет в зависимости от статуса
            let color;
            if (runner.status === 'finished') {
                color = '#f44336'; // красный для финишировавших
            } else if (runner.dorsal <= 50) {
                color = '#FF9800'; // оранжевый для лидеров
            } else {
                color = '#4CAF50'; // зеленый для остальных
            }

            // Создаем иконку
            const icon = L.divIcon({
                className: 'runner-marker',
                html: `
                    <div style="
                        background: ${color};
                        width: 24px;
                        height: 24px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        color: white;
                        font-weight: bold;
                        font-size: 12px;
                        border-radius: 50%;
                    ">
                        ${runner.dorsal}
                    </div>
                `,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            // Создаем маркер
            const marker = L.marker(
                [runner.position?.lat || raceTrack[0][0], runner.position?.lng || raceTrack[0][1]],
                { icon }
            );

            // Добавляем всплывающую подсказку
            marker.bindPopup(`
                <div style="font-weight: bold; font-size: 14px;">
                    ${runner.full_name}
                </div>
                <div style="margin-top: 5px; font-size: 12px;">
                    <strong>№:</strong> ${runner.dorsal}<br>
                    <strong>Категория:</strong> ${runner.category}<br>
                    <strong>Статус:</strong> ${getStatusText(runner.status)}<br>
                    <strong>Темп:</strong> ${runner.pace ? runner.pace.toFixed(2) + ' мин/км' : 'N/A'}
                </div>
            `);

            return marker;
        }

        /**
         * Текст статуса
         */
        function getStatusText(status) {
            const statusMap = {
                'registered': 'Зарегистрирован',
                'started': 'На трассе',
                'finished': 'Финишировал',
                'unknown': 'Неизвестно'
            };
            return statusMap[status] || status;
        }

        /**
         * Обновление информации о забеге
         */
        function updateRaceInfo(runnersData) {
            const total = runnersData.length;
            const finished = runnersData.filter(r => r.status === 'finished').length;
            const onTrack = total - finished;

            document.getElementById('totalRunners').textContent = total;
            document.getElementById('onTrack').textContent = onTrack;
            document.getElementById('finished').textContent = finished;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        }

        /**
         * Основное обновление данных
         */
        async function updateData() {
            try {
                const runnersData = await fetchRunnersData();

                if (runnersData.length === 0) {
                    document.getElementById('statusPanel').innerHTML =
                        '<strong style="color: orange;">Нет данных об участниках</strong>';
                    return;
                }

                // Обновляем статус
                document.getElementById('statusPanel').innerHTML =
                    `<strong>Участников: ${runnersData.length} | Обновлено: ${new Date().toLocaleTimeString()}</strong>`;

                // Обновляем информацию о забеге
                updateRaceInfo(runnersData);

                // Обновляем маркеры
                runnersData.forEach(runner => {
                    runners[runner.id] = runner;

                    if (markers[runner.id]) {
                        // Обновляем позицию существующего маркера
                        markers[runner.id].setLatLng([
                            runner.position?.lat || raceTrack[0][0],
                            runner.position?.lng || raceTrack[0][1]
                        ]);

                        // Обновляем всплывающую подсказку
                        markers[runner.id].setPopupContent(`
                            <div style="font-weight: bold; font-size: 14px;">
                                ${runner.full_name}
                            </div>
                            <div style="margin-top: 5px; font-size: 12px;">
                                <strong>№:</strong> ${runner.dorsal}<br>
                                <strong>Категория:</strong> ${runner.category}<br>
                                <strong>Статус:</strong> ${getStatusText(runner.status)}<br>
                                <strong>Темп:</strong> ${runner.pace ? runner.pace.toFixed(2) + ' мин/км' : 'N/A'}
                            </div>
                        `);
                    } else {
                        // Создаем новый маркер
                        const marker = createRunnerMarker(runner);
                        marker.addTo(map);
                        markers[runner.id] = marker;
                    }
                });

                // Удаляем маркеры участников, которых больше нет в данных
                Object.keys(markers).forEach(runnerId => {
                    if (!runnersData.find(r => r.id.toString() === runnerId)) {
                        map.removeLayer(markers[runnerId]);
                        delete markers[runnerId];
                        delete runners[runnerId];
                    }
                });

            } catch (error) {
                console.error('Ошибка в updateData:', error);
                document.getElementById('statusPanel').innerHTML =
                    `<strong style="color: red;">Ошибка: ${error.message}</strong>`;
            }
        }

        /**
         * Запуск периодического обновления
         */
        function startUpdates() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }

            updateInterval = setInterval(updateData, CONFIG.UPDATE_INTERVAL);
            updateData(); // Первое обновление сразу

            document.getElementById('pauseBtn').textContent = 'Пауза обновлений';
            isPaused = false;
        }

        /**
         * Остановка обновлений
         */
        function stopUpdates() {
            if (updateInterval) {
                clearInterval(updateInterval);
                updateInterval = null;
            }

            document.getElementById('pauseBtn').textContent = 'Возобновить обновления';
            isPaused = true;
        }

        // ====== ОБРАБОТЧИКИ СОБЫТИЙ ======
        document.getElementById('pauseBtn').addEventListener('click', function() {
            if (isPaused) {
                startUpdates();
            } else {
                stopUpdates();
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', function() {
            updateData();
        });

        document.getElementById('returnBtn').addEventListener('click', function() {
            if (routeLine) {
                map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
            } else {
                map.setView([56.03266, 92.95386], 15);
            }
        });

        // ====== ЗАПУСК ПРИЛОЖЕНИЯ ======
        document.addEventListener('DOMContentLoaded', async function() {
        console.log('🚀 Инициализация трекера Красмарафона');
            
            // Пытаемся загрузить маршрут из OpenStreetMap в фоновом режиме
            try {
                console.log(`🔄 Пытаемся загрузить маршрут с ID: ${CONFIG.OSM_WAY_ID}`);
                const loadedTrack = await fetchRouteFromOSM(CONFIG.OSM_WAY_ID);
                isRouteLoaded = true;
                
                // Обновляем маршрут на карте
                raceTrack = loadedTrack;
                initializeRoute(raceTrack);

                document.getElementById('statusPanel').innerHTML =
                '<strong style="color: green;">Маршрут из OpenStreetMap успешно загружен</strong>';
                console.log('✅ Маршрут из OpenStreetMap успешно загружен');
            } 
            catch (error) {
                raceTrack = CONFIG.BACKUP_TRACK;
                initializeRoute(raceTrack);
                console.error('❌ Ошибка загрузки маршрута:', error);
                document.getElementById('statusPanel').innerHTML =
                `<strong style="color: orange;">Ошибка загрузки маршрута: ${error.message}. Используется резервный маршрут.</strong>`;
                console.log('ℹ️ Используется резервный маршрут');
            }

            // Запускаем обновления данных
            startUpdates();
            console.log('✅ Трекер запущен');
        });
        
    </script>
</body>
</html>
