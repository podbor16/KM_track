<!DOCTYPE html>
<html>
<head>
    <title>Забег по маршруту OpenStreetMap</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="map"></div>
    
    <!-- Плашка "Не стартовал" -->
    <div class="status-panel" id="notStartedPanel">
        <strong>Не стартовал</strong>
    </div>
    
    <!-- Легенда карты -->
    <div class="legend-panel">
        <div class="legend-title">Легенда забега</div>
        <div class="legend-item"><span class="legend-color orange"></span> 1 круг</div>
        <div class="legend-item"><span class="legend-color red"></span> 2 круг</div>
    </div>
    
    <!-- Панель управления -->
    <div class="controls">
        <button id="returnBtn" class="return">Вернуться к забегу</button>
        <button id="pauseBtn">Пауза</button>
        <button id="resetBtn" class="reset">Начать заново</button>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ====== КООРДИНАТЫ И ИНИЦИАЛИЗАЦИЯ ======
        
        // Инициализация карты для Красноярска
        const map = L.map('map').setView([56.03266, 92.95386], 16);
        
        // Добавление OpenStreetMap слоя
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);
        
        // Переменные для хранения маршрута и состояния
        let path = []; // Маршрут будет загружен динамически
        let routeLine = null;
        let runnerMarker = null;
        
        // ====== ЗАГРУЗКА МАРШРУТА ИЗ OPENSTREETMAP ======
        
        // Функция для получения данных о маршруте из OpenStreetMap
        function fetchRouteFromOSM(wayId) {
            // Используем Overpass API для получения данных о пути
            const query = `[out:json];
            way(${wayId});
            out geom;`;
            
            const encodedQuery = encodeURIComponent(query);
            const url = `https://overpass-api.de/api/interpreter?data=${encodedQuery}`;
            
            return fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Ошибка при загрузке данных маршрута');
                    }
                    return response.json();
                })
                .then(data => {
                    // Извлекаем координаты из ответа
                    if (data.elements && data.elements.length > 0) {
                        const geometry = data.elements[0].geometry;
                        
                        // Преобразуем координаты в формат [широта, долгота] для Leaflet
                        const coords = geometry.map(point => [point.lat, point.lon]);
                        
                        // Замыкаем маршрут, если начальная и конечная точки не совпадают
                        if (coords.length > 1 && 
                            (coords[0][0] !== coords[coords.length-1][0] || 
                             coords[0][1] !== coords[coords.length-1][1])) {
                            coords.push([...coords[0]]);
                        }
                        
                        return coords;
                    } else {
                        throw new Error('Маршрут не найден');
                    }
                });
        }
        
        // ====== АНИМАЦИЯ И УПРАВЛЕНИЕ ======
        
        // Переменные для управления анимацией
        let index = 0;           // Индекс текущей точки маршрута
        let t = 0;               // Параметр интерполяции между точками 
        const speed = 0.003;     // Скорость движения
        let currentLap = 1;      // Номер текущего круга
        let isFinished = false;  // Флаг завершения забега
        let isPaused = false;    // Флаг паузы
        let animationFrameId = null; // ID анимационного кадра
        
        // Получение ссылки на плашку "Не стартовал"
        const startPanel = document.getElementById('notStartedPanel');
        
        // Сохранение начального положения карты для кнопки возврата - ИСПРАВЛЕНО: const заменены на let
        let initialCenter = [56.03266, 92.95386]; // Центр карты при старте
        let initialZoom = 16; // Начальный уровень масштабирования
        
        // ====== ФУНКЦИИ ======
        
        // Функция для изменения цвета маркера
        function changeMarkerColor(color, animation) {
            const markerElement = runnerMarker.getElement();
            markerElement.style.background = color;
            markerElement.style.animation = animation;
        }
        
        // Функция для показа плашки "финишировал!"
        function showFinishPopup() {
            const popupDiv = document.createElement('div');
            popupDiv.className = 'finish-popup';
            popupDiv.innerHTML = 'Финишировал!';
            
            document.body.appendChild(popupDiv);
            
            function positionPopup() {
                const markerPosition = map.latLngToContainerPoint(runnerMarker.getLatLng());
                popupDiv.style.left = (markerPosition.x + map._container.offsetLeft - popupDiv.offsetWidth/2) + 'px';
                popupDiv.style.top = (markerPosition.y + map._container.offsetTop - popupDiv.offsetHeight - 20) + 'px';
            }
            
            positionPopup();
            map.on('move', positionPopup);
            window.addEventListener('resize', positionPopup);
        }
        
        // Функция анимации движения
        function animate() {
            if (isPaused || isFinished) return;
            
            t += speed;
            if (t >= 1) {
                t = 0;
                index++;
                
                if (index >= path.length - 1) {
                    currentLap++;
                    index = 0;
                    
                    if (currentLap === 2) {
                        changeMarkerColor('rgba(255, 0, 0, 0.8)', 'pulse-red 2s infinite');
                    }
                    
                    if (currentLap > 2) {
                        isFinished = true;
                        showFinishPopup();
                        return;
                    }
                }
            }
            
            // Плавная интерполяция между точками
            const easingFactor = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
            const lat = path[index][0] + (path[index + 1][0] - path[index][0]) * easingFactor;
            const lng = path[index][1] + (path[index + 1][1] - path[index][1]) * easingFactor;
            
            runnerMarker.setLatLng([lat, lng]);
            animationFrameId = requestAnimationFrame(animate);
        }
        
        // Функция начала анимации с задержкой
        function startWithDelay() {
            startPanel.classList.add('hidden');
            startPanel.innerHTML = '<strong>Старт через 5 секунд</strong>';
            startPanel.classList.remove('hidden');
            
            let countdown = 4;
            const countdownInterval = setInterval(() => {
                if (countdown > 0) {
                    startPanel.innerHTML = `<strong>Старт через ${countdown} секунд</strong>`;
                    countdown--;
                } else {
                    clearInterval(countdownInterval);
                    startPanel.innerHTML = '<strong>Старт!</strong>';
                    
                    setTimeout(() => {
                        startPanel.classList.add('hidden');
                        
                        setTimeout(() => {
                            if (!isFinished) {
                                animate();
                            }
                        }, 500);
                    }, 1000);
                }
            }, 1000);
        }
        
        // Функция инициализации забега с загруженным маршрутом - ИСПРАВЛЕНО
        function initializeRace(route) {
            path = route;
            
            // Отрисовка всего маршрута серой линией (фон)
            routeLine = L.polyline(path, {
                color: '#666666',
                weight: 7,
                opacity: 0.5
            }).addTo(map);
            
            // Автоматическая настройка центра и масштаба карты под маршрут
            map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});
            
            // ИСПРАВЛЕНО: Теперь initialCenter и initialZoom объявлены как let
            initialCenter = [map.getCenter().lat, map.getCenter().lng];
            initialZoom = map.getZoom();
            
            // Создание пульсирующего маркера
            const pulseIcon = L.divIcon({
                className: 'pulse-marker',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            
            // Создание маркера на начальной позиции
            runnerMarker = L.marker(path[0], {icon: pulseIcon}).addTo(map);
            
            // Запуск анимации с задержкой после успешной загрузки маршрута
            startWithDelay();
        }
        
        // ====== ОБРАБОТЧИКИ СОБЫТИЙ ======
        
        document.getElementById('pauseBtn').addEventListener('click', function() {
            isPaused = !isPaused;
            this.textContent = isPaused ? 'Продолжить' : 'Пауза';
            
            if (!isPaused && !isFinished) {
                animate();
            }
        });
        
        document.getElementById('resetBtn').addEventListener('click', function() {
            // Остановка текущей анимации
            cancelAnimationFrame(animationFrameId);
            isPaused = false;
            isFinished = false;
            document.getElementById('pauseBtn').textContent = 'Пауза';
            
            // Сброс параметров
            index = 0;
            t = 0;
            currentLap = 1;
            
            // Сброс положения маркера
            if (runnerMarker) {
                runnerMarker.setLatLng(path[0]);
                changeMarkerColor('rgba(255, 165, 0, 0.8)', 'pulse 2s infinite');
            }
            
            // Удаление плашки финиша
            const finishPopup = document.querySelector('.finish-popup');
            if (finishPopup) {
                finishPopup.remove();
            }
            
            // Восстановление плашки "Не стартовал"
            startPanel.classList.remove('hidden');
            startPanel.innerHTML = '<strong>Не стартовал</strong>';
            
            // Перезапуск с задержкой
            startWithDelay();
        });
        
        document.getElementById('returnBtn').addEventListener('click', function() {
            map.setView(initialCenter, initialZoom);
        });
        
        // ====== ЗАПУСК ПРИЛОЖЕНИЯ ======
        
        document.addEventListener('DOMContentLoaded', function() {
            fetchRouteFromOSM(181589417)
                .then(route => {
                    initializeRace(route);
                })
                .catch(error => {
                    console.error('Ошибка при загрузке маршрута:', error);
                    // Откатываемся к резервному маршруту при ошибке
                    const backupPath = [
                        [56.028855, 92.946101],
                        [56.02996, 92.949893],
                        [56.031108, 92.951328],
                        [56.03227, 92.953744],
                        [56.032565, 92.95492],
                        [56.035519, 92.962478],
                        [56.036558, 92.966651],
                        [56.038971, 92.969956],
                        [56.036558, 92.966651],
                        [56.035519, 92.962478],
                        [56.032565, 92.95492],
                        [56.03227, 92.953744],
                        [56.031108, 92.951328],
                        [56.02996, 92.949893],
                        [56.028855, 92.946101]
                    ];
                    initializeRace(backupPath);
                    
                    alert('Не удалось загрузить маршрут из OpenStreetMap. Используется резервный маршрут.');
                });
        });
    </script>
</body>
</html>
