<!-- templates/header.html - Единый хэдер для всех страниц -->
<nav class="navbar">
    <div class="navbar-container">
        <a href="/" class="navbar-brand">
            <img src="/static/logo.png" alt="Логотип" class="navbar-logo" style="width: 50%;">
        </a>
        <button class="navbar-toggle" id="navbarToggle">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="navbar-menu" id="navbarMenu">
            <li class="navbar-item">
                <a href="/" class="navbar-link">ТРЕКЕР</a>
            </li>
            <li class="navbar-item">
                <a href="/analytics" class="navbar-link">РЕЗУЛЬТАТЫ</a>
            </li>
        </ul>
    </div>
</nav>

<script>
    // Мобильное меню
    const navbarToggle = document.getElementById('navbarToggle');
    const navbarMenu = document.getElementById('navbarMenu');
    
    if (navbarToggle && navbarMenu) {
        navbarToggle.addEventListener('click', () => {
            navbarMenu.classList.toggle('active');
        });
    
        // Закрываем меню при клике на ссылку
        document.querySelectorAll('.navbar-link').forEach(link => {
            link.addEventListener('click', () => {
                navbarMenu.classList.remove('active');
            });
        });
    }

    // Установить активный класс для текущей страницы
    const currentPath = window.location.pathname;
    const navbarLinks = document.querySelectorAll('.navbar-link');
    
    navbarLinks.forEach(link => {
        link.classList.remove('active');
    });
    
    if (currentPath === '/' || currentPath.startsWith('/tracker')) {
        navbarLinks[0].classList.add('active'); // Трекер
    } else if (currentPath.includes('/analytics')) {
        navbarLinks[1].classList.add('active'); // Результаты
    }
</script>
