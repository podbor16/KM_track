<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стартовый список и результаты забега</title>
    <link rel="stylesheet" href="/static/navigation.css">
    <link rel="stylesheet" href="/analytics/static/analytics.css">
    <style>
        @font-face {
            font-family: 'Houschka Pro';
            src: url('/static/houschkapro_demibold.otf') format('opentype');
            font-weight: 600;
            font-style: normal;
        }
        * {
            font-family: 'Houschka Pro', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <!-- Включаем единый хэдер -->
    {% include 'header.html' %}

    <div class="container">
        <h1>Стартовый список и результаты забега Красмарафон</h1>
        
        <div class="mode-selector">
            <button id="beforeModeBtn" class="mode-btn" onclick="switchMode('before')">Стартовый список</button>
            <button id="duringModeBtn" class="mode-btn active" onclick="switchMode('during')">Результаты</button>
        </div>
        
       <div class="filters">
           <div class="filter-group">
               <label for="genderFilter">Пол:</label>
               <select id="genderFilter" onchange="applyFilters()">
                   <option value="">Все</option>
                   <option value="male">мужчина</option>
                   <option value="female">женщина</option>
               </select>
           </div>
           
           <div class="filter-group" id="ageGroupFilterGroup">
               <label for="ageGroupFilter">Возрастная группа:</label>
               <select id="ageGroupFilter" onchange="applyFilters()">
                   <!-- Возрастные группы будут заполнены динамически -->
               </select>
           </div>
       </div>
       
       <div id="loadingIndicator" class="loading" style="display: none;">Загрузка данных...</div>
       <div id="errorIndicator" class="error" style="display: none;"></div>
       
       <!-- ТАБЛИЦА: Стартовый список (режим 'before') -->
       <table id="startListTable" class="before-mode-table" style="display: none;">
           <thead>
               <tr>
                   <th>№</th>
                   <th onclick="sortTable('surname')">Фамилия</th>
                   <th onclick="sortTable('name')">Имя</th>
                   <th onclick="sortTable('birthdate')">Год рождения</th>
                   <th onclick="sortTable('distance')">Дистанция</th>
                   <th onclick="sortTable('category')">Возрастная группа</th>
                   <th onclick="sortTable('sex')">Пол</th>
                   <th onclick="sortTable('city')">Город</th>
                   <th onclick="sortTable('club')">Клуб</th>
               </tr>
           </thead>
           <tbody id="startListBody">
               <!-- Данные будут добавлены через JavaScript -->
           </tbody>
       </table>
       
       <!-- ТАБЛИЦА: Результаты (режим 'during') -->
       <table id="resultsTable" class="during-mode-table">
           <thead>
               <tr>
                   <th>№</th>
                   <th onclick="sortTable('surname')">Фамилия</th>
                   <th onclick="sortTable('name')">Имя</th>
                   <th onclick="sortTable('birthdate')">Год рождения</th>
                   <th onclick="sortTable('event')">Дистанция</th>
                   <th onclick="sortTable('gender')">Пол</th>
                   <th onclick="sortTable('category')">Возрастная группа</th>
                   <th onclick="sortTable('status')">Статус</th>
                   <th>Время</th>
                   <th onclick="sortTable('pace')">Темп (мин/км)</th>
               </tr>
           </thead>
           <tbody id="resultsTableBody">
               <!-- Данные будут добавлены через JavaScript -->
           </tbody>
       </table>
    </div>

    <script src="/analytics/static/analytics.js"></script>
    <script>
        // Установить активный класс для текущей страницы
        const navbarLinks = document.querySelectorAll('.navbar-link');
        navbarLinks.forEach(link => {
            link.classList.remove('active');
        });
        navbarLinks[1].classList.add('active'); // Результаты (второй элемент)
    </script>
</body>
</html>
