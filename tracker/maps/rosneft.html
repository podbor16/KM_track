    <!-- maps/rosneft.html -->
    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Трекер забега Роснефть</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
        <link rel="stylesheet" href="/static/tracker.css">
        <style>
          @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
        }
          @keyframes slow-pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(255, 165, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 165, 0, 0); }
        }
        .runner-marker {
            transition: transform 0.3s ease-out;
        }
        .runner-marker:hover {
            transform: scale(1.2);
        }
        .moving-marker {
            transition: transform 2s cubic-bezier(0.2, 0, 0.2, 1);
        }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1 id="eventTitle">🏃 Трекер забега</h1>
                <p id="eventDescription">Загрузка...</p>
            </div>

            <div class="stats-panel" id="statsPanel">
                <!-- Статистика будет загружена через JS -->
            </div>

            <div class="tracker-container">
                <div class="map-container">
                    <div id="map"></div>
                </div>
                <div class="controls-panel">
                    <!-- Поисковая строка и результаты -->
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск по номеру или фамилии...">
                        <div class="search-results" id="searchResults"></div>
                    </div>

                    <!-- Контейнер для выбранных участников (между поиском и кнопками) -->
                    <div class="selected-runners-container">
                        <div class="selected-title">
                            <div class="title-text">Отслеживаемые участники</div>
                            <div class="count-container">
                                (<span id="selectedCount">0</span>/ 5 )
                                <span id="selection-limit-warning" class="limit-warning" style="display: none;">
                                    Достигнут лимит!
                                </span>
                            </div>
                        </div>
                        <div class="selected-list" id="selectedList">
                            <div class="empty-selection">Нет выбранных участников</div>
                        </div>
                    </div>

                    <!-- Кнопки (теперь в самом низу) -->
                    <div class="controls-buttons">
                        <button class="control-btn primary" onclick="centerMap()">Центрировать карту</button>
                        <button class="control-btn secondary" onclick="clearSelection()">Очистить выбор</button>
                    </div>
                </div>
            </div>

            <div class="status-panel" id="statusPanel">
                Загрузка данных...
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            // Загружаем событие с сервера
            let eventLoaded = false;
            fetch('/api/current-event')
                .then(r => r.json())
                .then(data => {
                    window.INITIAL_EVENT = data.event;
                    window.INITIAL_STORAGE = data.storage_key;
                    // Обновляем заголовок и описание
                    document.getElementById('eventTitle').textContent = data.title;
                    document.getElementById('eventDescription').textContent = data.description;
                    eventLoaded = true;
                })
                .catch(err => {
                    console.error('Ошибка загрузки события:', err);
                    // Используем undefined, трекер будет ждать данные с сервера
                    eventLoaded = true;
                });
        </script>
        <script src="/static/tracker.js"></script>
        <script>
            // Ждем загрузки события с сервера
            const waitForEvent = setInterval(() => {
                if (eventLoaded && window.INITIAL_EVENT) {
                    CONFIG.EVENT_NAME = window.INITIAL_EVENT;
                    CONFIG.STORAGE_KEY = window.INITIAL_STORAGE;
                    clearInterval(waitForEvent);
                    console.log('✓ Событие загружено:', CONFIG.EVENT_NAME);
                }
            }, 100);
        </script>
    </body>
</html>
